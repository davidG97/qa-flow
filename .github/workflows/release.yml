name: Release

# Solo releases manuales - Los colaboradores controlan cuándo crear versiones
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Create as beta/prerelease?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.new_version.outputs.version }}
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build
        run: pnpm build && pnpm --filter qa-flow-server build

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if prerelease
        id: prerelease
        run: |
          if [ "${{ github.event.inputs.prerelease }}" == "true" ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: new_version
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version
          BASE_VERSION=$(node -p "require('./package.json').version")
          
          if [ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]; then
            # Buscar el último beta de esta versión
            BETA_NUM=1
            EXISTING_BETA=$(git tag -l "v${BASE_VERSION}-beta.*" | sort -V | tail -1 || true)
            if [ -n "$EXISTING_BETA" ]; then
              LAST_NUM=$(echo $EXISTING_BETA | sed 's/.*-beta\.\([0-9]*\)/\1/')
              BETA_NUM=$((LAST_NUM + 1))
            fi
            NEW_VERSION="${BASE_VERSION}-beta.${BETA_NUM}"
            npm version $NEW_VERSION --no-git-tag-version --allow-same-version
          else
            NEW_VERSION=$BASE_VERSION
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update server package.json version
        run: |
          cd server
          npm version ${{ steps.new_version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREVIOUS_TAG}..HEAD)
          fi
          
          # Categorizar commits
          FEATURES=$(echo "$COMMITS" | grep -E "^- (feat|feature)" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- (fix|bugfix)" || true)
          DOCS=$(echo "$COMMITS" | grep -E "^- (docs|documentation)" || true)
          CHORES=$(echo "$COMMITS" | grep -E "^- (chore|ci|build|refactor|style|test)" || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^- (feat|feature|fix|bugfix|docs|documentation|chore|ci|build|refactor|style|test)" || true)
          
          CHANGELOG=""
          [ -n "$FEATURES" ] && CHANGELOG="$CHANGELOG\n### ✨ Features\n$FEATURES\n"
          [ -n "$FIXES" ] && CHANGELOG="$CHANGELOG\n### 🐛 Bug Fixes\n$FIXES\n"
          [ -n "$DOCS" ] && CHANGELOG="$CHANGELOG\n### 📚 Documentation\n$DOCS\n"
          [ -n "$CHORES" ] && CHANGELOG="$CHANGELOG\n### 🔧 Maintenance\n$CHORES\n"
          [ -n "$OTHER" ] && CHANGELOG="$CHANGELOG\n### 📝 Other Changes\n$OTHER\n"
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json server/package.json
          git commit -m "chore(release): v${{ steps.new_version.outputs.version }}"
          git tag -a "v${{ steps.new_version.outputs.version }}" -m "Release v${{ steps.new_version.outputs.version }}"
          git push origin main --tags

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          release_name: QA Flow v${{ steps.new_version.outputs.version }}
          body: |
            ## What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.current_version.outputs.version }}...v${{ steps.new_version.outputs.version }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

  # ==========================================
  # Docker Hub Publishing
  # ==========================================
  docker:
    name: Publish to Docker Hub
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/qa-flow
          tags: |
            type=raw,value=latest,enable=${{ needs.release.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=beta,enable=${{ needs.release.outputs.is_prerelease == 'true' }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.is_prerelease == 'false' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================
  # npm Publishing (Trusted Publishing / OIDC)
  # ==========================================
  check-packages-changes:
    name: Check for packages changes
    needs: release
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for changes in packages directory
        id: check
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            # First release, check all files
            CHANGES=$(git diff --name-only HEAD~10 HEAD -- packages/ || echo "packages/")
          else
            CHANGES=$(git diff --name-only ${PREVIOUS_TAG}..HEAD -- packages/)
          fi
          
          if [ -n "$CHANGES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in packages/:"
            echo "$CHANGES"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes in packages/ directory"
          fi

  npm:
    name: Publish to npm
    needs: [release, docker, check-packages-changes]
    if: needs.check-packages-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.version }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update CLI version and commit
        run: |
          cd packages/cli
          npm version ${{ needs.release.outputs.version }} --no-git-tag-version --allow-same-version
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git diff --cached --quiet || git commit -m "chore(cli): bump version to ${{ needs.release.outputs.version }}"
          git push origin HEAD:main || true

      - name: Install dependencies
        working-directory: packages/cli
        run: pnpm install

      - name: Publish to npm
        working-directory: packages/cli
        run: |
          if [[ "${{ needs.release.outputs.is_prerelease }}" == "true" ]]; then
            npm publish --tag beta --access public --provenance
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
