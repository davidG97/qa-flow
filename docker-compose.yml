# ================================================
# QA Flow - Docker Compose (Usuarios)
# ================================================
# 
# Quick Start:
#   docker compose up -d
#
# Con PostgreSQL:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Para desarrollo (build local):
#   docker compose -f docker-compose.dev.yml up -d
#
# ================================================

services:
  qa-flow:
    image: davidg97/qa-flow:latest
    container_name: qa-flow
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/qa-flow.db}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      # Persist SQLite database
      - qa-flow-data:/app/data
      # Persist screenshots and recordings
      - qa-flow-screenshots:/app/server/screenshots
      - qa-flow-recordings:/app/server/recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qa-flow-data:
    name: qa-flow-data
  qa-flow-screenshots:
    name: qa-flow-screenshots
  qa-flow-recordings:
    name: qa-flow-recordings
